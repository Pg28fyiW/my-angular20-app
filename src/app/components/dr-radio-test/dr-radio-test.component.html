<div class="test_area">
  <h4>これはSafariでのラジオボタンのテストです。20260523 0011</h4>

  <div class="radio_group">
        <div class="radio_item" *ngFor="let item of radioButtonTypeList">

            <input type="radio" [value]="item.value" id="test_radio_button_{{ item.value }}"
                name="radioButtonTypeTest" [(ngModel)]="inputData.radioButtonType" (ngModelChange)="updateInputData()">

            <label class="radio_button" for="test_radio_button_{{ item.value }}">
                {{ item.label }}
            </label>

            <img src="assets/images/common/question.png" class="question pointer"
                (click)="openQuestionModal(item.value); $event.stopPropagation()"
                [attr.id]="item.value === RadioTypeConst.RADIO_BUTTON_1
                    ? 'gaclick_radio_button_type1' : 'gaclick_radio_button_type2'">

        </div>
  </div>

  <p class="debug_text">
    選択中: {{ inputData.radioButtonType }}
  </p>
</div>
